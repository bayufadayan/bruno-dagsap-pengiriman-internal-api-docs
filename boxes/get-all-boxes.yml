info:
  name: get-all-boxes
  type: http
  seq: 1

http:
  method: GET
  url: "{{BACKEND_BASE_URL}}/boxes?page=1&limit=10"
  params:
    - name: page
      value: "1"
      type: query
    - name: limit
      value: "10"
      type: query
  auth:
    type: bearer
    token: "{{TOKEN_SUPER_ADMIN}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
